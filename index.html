<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>VR Starter — Schietspel</title>
  <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
</head>
<body>
  <a-scene background="color: #ECECEC">

    <!-- ============================================================
         COMPONENT: maak van een entity een aanklikbaar doelwit.
         Klik (muis) of trigger (VR-controller) geeft +1 punt,
         daarna verspringt het doelwit naar een willekeurige plek.
         ============================================================ -->
    <script>
      AFRAME.registerComponent('target', {
        init: function () {
          var el = this.el;
          el.addEventListener('click', function () {
            // punt scoren
            var scoreEl = document.querySelector('#scoreText');
            var score = (parseInt(scoreEl.getAttribute('value').replace(/\D/g, '')) || 0) + 1;
            scoreEl.setAttribute('value', 'Score: ' + score);

            // korte "hit"-animatie + nieuwe positie
            // raak = meteen verspringen, geen vertraging
            el.setAttribute('position', {
              x: (Math.random() - 0.5) * 6,
              y: Math.random() * 2.5 + 0.8,
              z: -(Math.random() * 4 + 2)
            });
          });
        }
      });
    </script>

    <!-- Licht -->
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.6" position="1 3 1"></a-entity>

    <!-- Vloer en lucht -->
    <a-plane rotation="-90 0 0" width="40" height="40" color="#5b6b5b"></a-plane>
    <a-sky color="#88a0c0"></a-sky>

    <!-- Score-bord, blijft voor je hangen -->
    <a-entity position="0 2.6 -4">
      <a-text id="scoreText" value="Score: 0" align="center"
              color="#222" width="6" position="0 0 0"></a-text>
    </a-entity>

    <!-- Doelwitten -->
    <a-box class="clickable" target color="#EF2D5E" depth="0.4" height="0.4" width="0.4"
           position="-1.5 1.6 -3"
           animation__hit="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dur: 100; startEvents: hit; dir: alternate; loop: 1"></a-box>
    <a-box class="clickable" target color="#EF2D5E" depth="0.4" height="0.4" width="0.4"
           position="1.5 1.2 -3.5"
           animation__hit="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dur: 100; startEvents: hit; dir: alternate; loop: 1"></a-box>
    <a-box class="clickable" target color="#EF2D5E" depth="0.4" height="0.4" width="0.4"
           position="0 2.2 -4"
           animation__hit="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dur: 100; startEvents: hit; dir: alternate; loop: 1"></a-box>

    <!-- Speler: camera + besturing -->
    <a-entity id="rig" position="0 0 0">
      <a-camera>
        <!-- Desktop/mobiel: richtkruis dat klikt op .clickable objecten -->
        <a-cursor color="#FFC65D" raycaster="objects: .clickable"></a-cursor>
      </a-camera>

      <!-- VR-controllers: laserstraal om mee te richten en te triggeren -->
      <a-entity laser-controls="hand: left"  raycaster="objects: .clickable; lineColor: #FFC65D"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; lineColor: #FFC65D"></a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
